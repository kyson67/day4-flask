<!DOCTYPE html>
<html class="light" lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
      body { font-family: Manrope, sans-serif; background-color: #fff8f5; }
    </style>
    <title>{% if mode == 'edit' %}글 수정{% else %}글쓰기{% endif %}</title>
  </head>
  <body class="text-stone-800 antialiased min-h-screen">
    <header class="bg-stone-50 border-b border-stone-200/50 fixed top-0 left-0 w-full z-50">
      <div class="flex justify-between items-center h-16 px-6 w-full max-w-lg mx-auto">
        <a href="{% if mode == 'edit' %}{{ url_for('post_detail', post_id=post['id']) }}{% else %}{{ url_for('list_posts') }}{% endif %}" class="text-orange-900 hover:bg-stone-100 transition-colors p-2 rounded-full">←</a>
        <h1 class="font-semibold text-lg tracking-tight text-orange-900">The Journal</h1>
        <a href="{{ url_for('list_posts') }}" class="text-sm text-stone-500">목록</a>
      </div>
    </header>

    <main class="pt-24 pb-24 px-6 max-w-lg mx-auto min-h-screen flex flex-col gap-6">
      <h2 class="text-xl font-semibold text-stone-900">{% if mode == 'edit' %}글 수정{% else %}글쓰기{% endif %}</h2>

      {% if error %}
        <div class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{ error }}</div>
      {% endif %}

      <form method="post" action="{% if mode == 'edit' %}{{ url_for('update_post', post_id=post['id']) }}{% else %}{{ url_for('create_post') }}{% endif %}" class="flex flex-col gap-5">
        <div class="space-y-2">
          <label class="text-sm font-semibold text-[#715b3e] uppercase tracking-widest ml-1" for="title">제목</label>
          <input
            id="title"
            name="title"
            required
            autofocus
            class="w-full rounded-xl border border-stone-200 bg-white px-4 py-3 text-lg focus:border-[#8b7355] focus:ring-[#8b7355]"
            placeholder="제목을 입력하세요"
            type="text"
            value="{{ post['title'] if post else '' }}"
          />
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold text-[#715b3e] uppercase tracking-widest ml-1" for="content">내용</label>
          <textarea
            id="content"
            name="content"
            required
            class="w-full min-h-[360px] rounded-xl border border-stone-200 bg-white px-4 py-3 text-base leading-relaxed focus:border-[#8b7355] focus:ring-[#8b7355] resize-y"
            placeholder="내용을 입력하세요"
          >{{ post['content'] if post else '' }}</textarea>
        </div>

        <div class="pt-2">
          <button type="submit" class="w-full bg-[#8b7355] text-white h-12 rounded-full font-bold hover:opacity-90 transition-opacity">
            {% if mode == 'edit' %}수정 완료{% else %}작성 완료{% endif %}
          </button>
        </div>
      </form>
    </main>
  </body>
</html>
